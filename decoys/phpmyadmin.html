<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>phpMyAdmin</title>
    <style>
        body {
            font-family: sans-serif;
            font-size: 82%;
            background-color: #f3f3f3;
            color: #444;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #loginform {
            background-color: #fff;
            border: 1px solid #aaa;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            width: 350px;
        }
        .header {
            background-color: #e5e5e5;
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #aaa;
        }
        .header h1 {
            font-size: 1.5em;
            margin: 0;
            color: #333;
            font-weight: normal;
        }
        .body {
            padding: 20px;
        }
        .item {
            margin-bottom: 15px;
        }
        .item label {
            display: inline-block;
            width: 90px;
            font-weight: bold;
        }
        .item input[type="text"], .item input[type="password"] {
            width: 190px;
            padding: 5px;
            border: 1px solid #aaa;
        }
        .footer {
            background-color: #e5e5e5;
            padding: 10px;
            text-align: right;
            border-top: 1px solid #aaa;
        }
        .footer input[type="submit"] {
            padding: 5px 15px;
            background-color: #ddd;
            border: 1px solid #aaa;
            cursor: pointer;
            font-weight: bold;
        }
        .footer input[type="submit"]:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>
    <div id="loginform">
        <div class="header">
            <h1>Welcome to phpMyAdmin</h1>
        </div>
        <form method="post" action="/phpmyadmin" class="login">
            <div class="body">
                <div class="item">
                    <label for="input_username">Username:</label>
                    <input type="text" name="pma_username" id="input_username" value="" size="24" required>
                </div>
                <div class="item">
                    <label for="input_password">Password:</label>
                    <input type="password" name="pma_password" id="input_password" value="" size="24" required>
                </div>
            </div>
            <div class="footer">
                <input type="submit" value="Go" id="input_go">
            </div>
        </form>
    </div>
</body>
</html>
