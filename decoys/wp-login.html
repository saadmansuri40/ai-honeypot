<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Log In &lsaquo; WordPress</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body {
            background: #f0f0f1;
            color: #3c434a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            font-size: 13px;
            margin: 0;
        }
        #login {
            width: 320px;
            padding: 8% 0 0;
            margin: auto;
        }
        #login h1 {
            text-align: center;
        }
        #login h1 a {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 122.5 122.5"><path fill="%232271b1" d="M61.2 0C27.4 0 0 27.4 0 61.2s27.4 61.2 61.2 61.2 61.2-27.4 61.2-61.2S95 0 61.2 0zm0 119C29.4 119 3.5 93.1 3.5 61.2S29.4 3.5 61.2 3.5s57.8 25.9 57.8 57.8-25.9 57.8-57.8 57.8z"/><path fill="%232271b1" d="M96.7 44.8c0-5.4-1.9-9.2-3.8-12.2-2.7-4.1-5.4-7.4-5.4-11.4 0-4.6 3.5-8.8 8.4-8.8.2 0 .5 0 .7.1-8.5-6.6-19.3-10.5-30.8-10.5-22.1 0-40.9 14.1-47.5 33.7l30 82.3c2-5.5 19.3-53.7 19.3-53.7zM63.5 68.3L48.1 112c4.1 1.2 8.5 1.9 13.1 1.9 6.8 0 13.2-1.3 19.1-3.7L63.5 68.3zM100.8 77.1c0 7.4-1.3 14.1-3.5 20.3L77.9 44c1.6-1.5 3-3.4 4-5.2h.2c6.2 0 16-.2 16-.2 1.9 0 2.2 2.7.2 3L91.1 43c.8 2.6 1.3 5.4 1.3 8.3 0 4.1-1.3 9.4-4 16.5l12.4 34.6c4.7-7.7 7.4-16.8 7.4-26.6 0-3.3-.3-6.5-.8-9.6zM15 61.2c0-10.6 3.6-20.4 9.6-28.2l30.2 82.5c-23.7-6-40.9-28.5-40.9-54.3z"/></svg>');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 84px;
            display: block;
            height: 84px;
            width: 84px;
            margin: 0 auto 25px;
            text-indent: -9999px;
            outline: 0;
            overflow: hidden;
        }
        form {
            margin-top: 20px;
            margin-left: 0;
            padding: 26px 24px 46px;
            background: #fff;
            border: 1px solid #c3c4c7;
            box-shadow: 0 1px 3px rgba(0,0,0,.04);
            border-radius: 4px;
        }
        form p {
            margin-bottom: 14px;
        }
        label {
            color: #3c434a;
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        input[type="text"], input[type="password"] {
            font-size: 24px;
            line-height: 1.33333333;
            width: 100%;
            border-width: 1px;
            border-style: solid;
            padding: 0 8px;
            min-height: 40px;
            max-height: none;
            border-color: #8c8f94;
            border-radius: 4px;
            background: #fff;
            box-shadow: 0 0 0 transparent;
            transition: box-shadow .1s linear;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #2271b1;
            box-shadow: 0 0 0 1px #2271b1;
            outline: 2px solid transparent;
        }
        .forgetmenot {
            float: left;
            margin-bottom: 0;
        }
        .submit {
            float: right;
            margin-bottom: 0;
        }
        .button-primary {
            background: #2271b1;
            border-color: #2271b1;
            color: #fff;
            text-decoration: none;
            text-shadow: none;
            display: inline-block;
            font-size: 13px;
            line-height: 2.15384615;
            min-height: 32px;
            margin: 0;
            padding: 0 10px;
            cursor: pointer;
            border-width: 1px;
            border-style: solid;
            appearance: none;
            border-radius: 3px;
            white-space: nowrap;
            box-sizing: border-box;
        }
        #nav, #backtoblog {
            font-size: 13px;
            padding: 0 24px 0;
            margin: 24px 0 0;
        }
        #nav a, #backtoblog a {
            text-decoration: none;
            color: #2271b1;
        }
        #nav a:hover, #backtoblog a:hover {
            color: #0a4b78;
        }
    </style>
</head>
<body class="login">
    <div id="login">
        <h1><a href="https://wordpress.org/">Powered by WordPress</a></h1>
        <form name="loginform" id="loginform" action="/wp-login.php" method="post">
            <p>
                <label for="user_login">Username or Email Address</label>
                <input type="text" name="log" id="user_login" class="input" value="" size="20" required />
            </p>
            <p>
                <label for="user_pass">Password</label>
                <input type="password" name="pwd" id="user_pass" class="input" value="" size="20" required />
            </p>
            <p class="forgetmenot">
                <input name="rememberme" type="checkbox" id="rememberme" value="forever" />
                <label for="rememberme" style="display:inline; font-size:13px; font-weight:normal;">Remember Me</label>
            </p>
            <p class="submit">
                <input type="submit" name="wp-submit" id="wp-submit" class="button-primary" value="Log In" />
            </p>
        </form>
        <p id="nav">
            <a href="#">Lost your password?</a>
        </p>
        <p id="backtoblog">
            <a href="/">&larr; Go to Site</a>
        </p>
    </div>
</body>
</html>
